# ==========================================
# 1. Authoritative Server (AS)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: as-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: as
  template:
    metadata:
      labels:
        app: as
    spec:
      containers:
        - name: as-container
          image: leeggroy/as_image:latest
          ports:
            - containerPort: 53533
              protocol: UDP

---
apiVersion: v1
kind: Service
metadata:
  name: as
spec:
  type: NodePort
  selector:
    app: as
  ports:
    - protocol: UDP
      port: 53533
      targetPort: 53533
      nodePort: 30001

---
# ==========================================
# 2. Fibonacci Server (FS)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fs-deployment
