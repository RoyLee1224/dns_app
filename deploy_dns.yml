  replicas: 1
  selector:
    matchLabels:
      app: fs
  template:
    metadata:
      labels:
        app: fs
    spec:
      containers:
        - name: fs-container
          image: leeggroy/fs_image:latest
          ports:
            - containerPort: 9090
              protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: fs
spec:
  type: NodePort
  selector:
    app: fs
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
      nodePort: 30002

---
